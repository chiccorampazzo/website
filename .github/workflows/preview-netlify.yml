name: Netlify Preview Deploy

on:
  pull_request:
    branches:
      - master

jobs:
  build-and-preview-deploy:
    name: Build and deploy preview to Netlify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Enable pnpm via corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Deploy preview to Netlify
        uses: netlify/actions/cli@v6
        with:
          args: deploy --dir=.next --site=${{ secrets.NETLIFY_SITE_ID }} --message "Preview for PR #${{ github.event.pull_request.number }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_API_KEY }}
