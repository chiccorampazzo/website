name: Netlify Production Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    name: Build and deploy to Netlify production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Enable pnpm via corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Deploy to Netlify production
        uses: netlify/actions/cli@v6
        with:
          args: deploy --prod --dir=.next --site=${{ secrets.NETLIFY_SITE_ID }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_API_KEY }}
